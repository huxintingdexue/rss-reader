<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>夜读 · 大佬说</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;600&family=Noto+Sans+SC:wght@300;400&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
:root {
  --bg: #0a0a0a;
  --text: #d4cfc8;
  --dim: #6b6560;
  --faint: #3a3733;
  --card: #111010;
  --sam: #c8a055;
  --paul: #7aab8a;
  --andrej: #7a9ab5;
  --peter: #a87a9a;
  --pad: 32px;
}
html,body { width:100%; height:100%; overflow:hidden; background:var(--bg); color:var(--text); font-family:'Noto Serif SC',Georgia,serif; }

/* LOADING */
#loading {
  position:fixed; inset:0; display:flex; flex-direction:column;
  align-items:center; justify-content:center; background:var(--bg);
  z-index:999; gap:18px; transition:opacity 0.5s;
}
#loading.hide { opacity:0; pointer-events:none; }
.spinner { width:28px; height:28px; border:1px solid #2a2a2a; border-top-color:#666; border-radius:50%; animation:spin 0.9s linear infinite; }
.load-label { font-family:'Noto Sans SC',sans-serif; font-size:11px; color:var(--faint); letter-spacing:0.25em; }
@keyframes spin { to{transform:rotate(360deg)} }

/* FILTER BAR */
#bar {
  position:fixed; top:0; left:0; right:0; z-index:60;
  background:rgba(10,10,10,0.94); backdrop-filter:blur(12px);
  display:flex; padding:0 var(--pad);
  border-bottom:1px solid #161616;
}
.ftab {
  font-family:'Noto Sans SC',sans-serif; font-size:10px;
  letter-spacing:0.15em; color:var(--faint);
  padding:12px 10px; cursor:pointer;
  border-bottom:1px solid transparent; transition:all 0.2s;
  user-select:none; white-space:nowrap;
}
.ftab.active { color:var(--dim); border-bottom-color:#444; }

/* BOOK */
#book { width:100%; height:100%; position:relative; overflow:hidden; }

/* PAGE */
.page {
  position:absolute; inset:0;
  display:flex; flex-direction:column;
  padding:52px var(--pad) 60px;
}

/* COVER */
.cover-page { justify-content:center; align-items:center; text-align:center; }
.cover-eyebrow { font-family:'Noto Sans SC',sans-serif; font-size:9px; letter-spacing:0.5em; color:var(--faint); text-transform:uppercase; margin-bottom:40px; }
.cover-title { font-size:clamp(44px,13vw,64px); font-weight:300; line-height:1.2; letter-spacing:0.06em; margin-bottom:32px; }
.cover-rule { width:1px; height:44px; background:var(--faint); margin:0 auto 28px; }
.cover-authors { font-family:'Noto Sans SC',sans-serif; font-size:10px; color:var(--faint); letter-spacing:0.18em; line-height:2.4; }
.cover-swipe { margin-top:60px; font-family:'Noto Sans SC',sans-serif; font-size:10px; color:var(--faint); letter-spacing:0.2em; animation:breathe 2.5s ease-in-out infinite; }
@keyframes breathe { 0%,100%{opacity:0.2} 50%{opacity:0.7} }

/* ARTICLE CARD PAGE */
.card-page { justify-content:center; cursor:pointer; }
.card-wrap {
  background:var(--card); border:1px solid #1c1c1c;
  padding:28px 24px; border-radius:2px;
  transition:border-color 0.2s;
  position:relative; overflow:hidden;
}
.card-wrap::before {
  content:''; position:absolute; left:0; top:0; bottom:0; width:2px;
  background:var(--author-color,var(--dim));
}
.card-eyebrow { display:flex; align-items:center; gap:10px; margin-bottom:20px; }
.card-dot { width:5px; height:5px; border-radius:50%; background:var(--author-color,var(--dim)); flex-shrink:0; }
.card-author { font-family:'Noto Sans SC',sans-serif; font-size:9px; letter-spacing:0.22em; color:var(--dim); text-transform:uppercase; flex:1; }
.card-date { font-family:'Noto Sans SC',sans-serif; font-size:9px; color:var(--faint); letter-spacing:0.1em; }
.card-title { font-size:clamp(18px,5vw,24px); font-weight:400; line-height:1.5; letter-spacing:0.02em; color:var(--text); margin-bottom:20px; }
.card-summary { font-size:clamp(13px,3.5vw,15px); font-weight:300; line-height:1.85; color:#7a7570; letter-spacing:0.03em; display:-webkit-box; -webkit-line-clamp:4; -webkit-box-orient:vertical; overflow:hidden; }
.card-tap-hint { margin-top:20px; font-family:'Noto Sans SC',sans-serif; font-size:9px; color:var(--faint); letter-spacing:0.15em; display:flex; align-items:center; gap:6px; }
.card-tap-hint::before { content:''; flex:1; height:1px; background:#1e1e1e; }

/* END PAGE */
.end-page { justify-content:center; align-items:center; text-align:center; }
.end-moon { font-size:32px; opacity:0.5; margin-bottom:28px; }
.end-title { font-size:18px; font-weight:300; color:var(--dim); letter-spacing:0.1em; margin-bottom:14px; }
.end-sub { font-family:'Noto Sans SC',sans-serif; font-size:10px; color:var(--faint); letter-spacing:0.2em; line-height:2.5; }
.end-btn { margin-top:44px; background:none; border:1px solid #1e1e1e; color:var(--faint); font-family:'Noto Sans SC',sans-serif; font-size:10px; letter-spacing:0.2em; padding:10px 24px; cursor:pointer; transition:all 0.2s; }
.end-btn:active { border-color:#444; color:var(--dim); }

/* FULL READ OVERLAY */
#reader {
  position:fixed; inset:0; z-index:200;
  background:var(--bg);
  display:flex; flex-direction:column;
  transform:translateY(100%);
  transition:transform 0.35s cubic-bezier(0.4,0,0.2,1);
  overflow:hidden;
}
#reader.open { transform:translateY(0); }

#reader-bar {
  display:flex; align-items:center; padding:14px var(--pad);
  border-bottom:1px solid #161616; flex-shrink:0;
}
#reader-author { font-family:'Noto Sans SC',sans-serif; font-size:9px; letter-spacing:0.22em; color:var(--dim); text-transform:uppercase; flex:1; }
#reader-close { background:none; border:none; color:var(--faint); font-size:20px; cursor:pointer; padding:4px; line-height:1; }

#reader-body { flex:1; overflow-y:auto; padding:32px var(--pad) 48px; -webkit-overflow-scrolling:touch; }
#reader-title { font-size:clamp(22px,6vw,32px); font-weight:400; line-height:1.45; letter-spacing:0.02em; color:var(--text); margin-bottom:28px; }
#reader-rule { width:24px; height:1px; background:var(--faint); margin-bottom:28px; }
#reader-text { font-size:clamp(15px,4vw,18px); font-weight:300; line-height:2.1; color:#8a8580; letter-spacing:0.04em; }
#reader-link {
  display:inline-block; margin-top:40px;
  font-family:'Noto Sans SC',sans-serif; font-size:10px;
  color:var(--dim); letter-spacing:0.2em; text-decoration:none;
  border-bottom:1px solid #2a2a2a; padding-bottom:2px;
}

/* PROGRESS + COUNTER */
#progress { position:fixed; bottom:0; left:0; right:0; height:2px; background:#141414; z-index:50; }
#pfill { height:100%; background:#2a2a2a; transition:width 0.3s ease; }
#counter { position:fixed; bottom:12px; right:var(--pad); font-family:'Noto Sans SC',sans-serif; font-size:9px; color:var(--faint); letter-spacing:0.12em; z-index:50; user-select:none; }
</style>
</head>
<body>

<div id="loading"><div class="spinner"></div><div class="load-label">正在加载</div></div>

<div id="bar">
  <div class="ftab active" onclick="setFilter('all',this)">全部</div>
  <div class="ftab" onclick="setFilter('sam',this)">Sam</div>
  <div class="ftab" onclick="setFilter('paul',this)">Paul</div>
  <div class="ftab" onclick="setFilter('andrej',this)">Andrej</div>
  <div class="ftab" onclick="setFilter('peter',this)">Peter</div>
</div>

<div id="book"></div>

<div id="progress"><div id="pfill" style="width:0%"></div></div>
<div id="counter"></div>

<!-- FULL READER OVERLAY -->
<div id="reader">
  <div id="reader-bar">
    <span id="reader-author"></span>
    <button id="reader-close" onclick="closeReader()">✕</button>
  </div>
  <div id="reader-body">
    <div id="reader-title"></div>
    <div id="reader-rule"></div>
    <div id="reader-text"></div>
    <a id="reader-link" href="#" target="_blank" rel="noopener">阅读原文 →</a>
  </div>
</div>

<script>
const FEEDS = [
  { key:'sam',    label:'Sam Altman',      color:'var(--sam)',    url:'https://blog.samaltman.com/posts.atom'  },
  { key:'paul',   label:'Paul Graham',     color:'var(--paul)',   url:'https://www.paulgraham.com/rss.html'   },
  { key:'andrej', label:'Andrej Karpathy', color:'var(--andrej)', url:'https://karpathy.github.io/feed.xml'  },
  { key:'peter',  label:'Peter Steipete',  color:'var(--peter)',  url:'https://steipete.me/feed.xml'         },
];
const PROXY = 'https://api.allorigins.win/get?url=';

let all=[], filtered=[], pages=[], cur=0, filterKey='all';
let tx=0, ty=0, turning=false;

// ── FETCH ──
async function fetchFeed(f) {
  try {
    const r = await fetch(PROXY+encodeURIComponent(f.url), {signal:AbortSignal.timeout(12000)});
    const d = await r.json();
    return parse(d.contents, f);
  } catch(e){ return []; }
}
function parse(xml, f) {
  const doc = new DOMParser().parseFromString(xml,'text/xml');
  return Array.from(doc.querySelectorAll('item,entry')).slice(0,8).map(el=>{
    const ds = gt(el,'pubDate')||gt(el,'updated')||gt(el,'published');
    const d  = ds ? new Date(ds) : null;
    return { key:f.key, label:f.label, color:f.color,
             title:gt(el,'title')||'无标题', link:getLink(el),
             summary:getSummary(el), date:d, dateStr:fmtDate(d) };
  });
}
function gt(el,s){ const n=el.querySelector(s); return n?n.textContent.trim():''; }
function getLink(el){ const a=el.querySelector('link'); return a?(a.getAttribute('href')||a.textContent.trim()):'#'; }
function getSummary(el){
  for(const s of['summary','description','content']){
    const n=el.querySelector(s);
    if(n&&n.textContent.trim().length>20){
      const d=document.createElement('div'); d.innerHTML=n.textContent;
      const t=d.textContent.replace(/\s+/g,' ').trim();
      return t.length>600?t.slice(0,600)+'…':t;
    }
  }
  return '点击阅读原文了解详情。';
}
function fmtDate(d){
  if(!d)return'';
  const days=Math.floor((Date.now()-d)/86400000);
  if(days===0)return'今天'; if(days===1)return'昨天';
  if(days<30)return days+'天前'; if(days<365)return Math.floor(days/30)+'个月前';
  return d.getFullYear()+'';
}

// ── BUILD ──
function buildPages(){
  filtered = filterKey==='all' ? all : all.filter(a=>a.key===filterKey);
  pages = ['cover',...filtered,'end'];
  cur=0; renderCur();
}

function renderCur(){
  const book=document.getElementById('book');
  book.innerHTML='';
  book.appendChild(makePage(pages[cur]));
  updateMeta();
}

function makePage(data){
  const div=document.createElement('div');
  div.className='page';
  if(data==='cover'){
    div.classList.add('cover-page');
    div.innerHTML=`
      <div class="cover-eyebrow">night reading</div>
      <div class="cover-title">夜读<br>大佬说</div>
      <div class="cover-rule"></div>
      <div class="cover-authors">Sam Altman · Paul Graham<br>Andrej Karpathy · Peter Steipete<br><br>共 ${filtered.length} 篇最新文章</div>
      <div class="cover-swipe">← 左滑开始阅读 →</div>`;
  } else if(data==='end'){
    div.classList.add('end-page');
    div.innerHTML=`
      <div class="end-moon">🌙</div>
      <div class="end-title">今晚读完了</div>
      <div class="end-sub">别熬太晚<br>明天还有新内容等你</div>
      <button class="end-btn" onclick="loadAll()">↻ 刷新文章</button>`;
  } else {
    div.classList.add('card-page');
    div.style.setProperty('--author-color', data.color);
    div.innerHTML=`
      <div class="card-wrap" onclick="openReader(${pages.indexOf(data)-1})">
        <div class="card-eyebrow">
          <span class="card-dot"></span>
          <span class="card-author">${data.label}</span>
          <span class="card-date">${data.dateStr}</span>
        </div>
        <div class="card-title">${esc(data.title)}</div>
        <div class="card-summary">${esc(data.summary)}</div>
        <div class="card-tap-hint">点击展开全文</div>
      </div>`;
  }
  return div;
}
function esc(s){ return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function updateMeta(){
  const pct=pages.length<=1?0:(cur/(pages.length-1)*100);
  document.getElementById('pfill').style.width=pct+'%';
  document.getElementById('counter').textContent=`${cur+1} / ${pages.length}`;
}

// ── TURN ──
function turnPage(dir){
  if(turning) return;
  // Block if reader is open
  if(document.getElementById('reader').classList.contains('open')) return;
  const next=cur+dir;
  if(next<0||next>=pages.length) return;
  turning=true;

  const book=document.getElementById('book');
  const old=book.querySelector('.page');
  old.style.transition='transform 0.3s cubic-bezier(0.4,0,0.2,1),opacity 0.3s ease';
  old.style.transform=dir>0?'translateX(-100%)':'translateX(100%)';
  old.style.opacity='0';

  const pg=makePage(pages[next]);
  pg.style.transform=dir>0?'translateX(100%)':'translateX(-100%)';
  pg.style.opacity='0'; pg.style.transition='none';
  book.appendChild(pg);
  requestAnimationFrame(()=>requestAnimationFrame(()=>{
    pg.style.transition='transform 0.3s cubic-bezier(0.4,0,0.2,1),opacity 0.3s ease';
    pg.style.transform='translateX(0)'; pg.style.opacity='1';
  }));
  setTimeout(()=>{ old.remove(); turning=false; },320);
  cur=next; updateMeta();
}

// ── TOUCH ──
document.addEventListener('touchstart',e=>{ tx=e.touches[0].clientX; ty=e.touches[0].clientY; },{passive:true});
document.addEventListener('touchend',e=>{
  if(document.getElementById('reader').classList.contains('open')) return;
  const dx=e.changedTouches[0].clientX-tx;
  const dy=e.changedTouches[0].clientY-ty;
  if(Math.abs(dx)<44||Math.abs(dy)>Math.abs(dx)*0.7) return;
  turnPage(dx<0?1:-1);
},{passive:true});

// ── READER ──
function openReader(idx){
  const a=filtered[idx];
  if(!a) return;
  document.getElementById('reader-author').textContent=a.label;
  document.getElementById('reader-title').textContent=a.title;
  document.getElementById('reader-text').textContent=a.summary;
  document.getElementById('reader-link').href=a.link;
  document.getElementById('reader-body').scrollTop=0;
  document.getElementById('reader').classList.add('open');
}
function closeReader(){
  document.getElementById('reader').classList.remove('open');
}

// ── FILTER ──
function setFilter(key,el){
  filterKey=key;
  document.querySelectorAll('.ftab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  buildPages();
}

// ── LOAD ──
async function loadAll(){
  const ld=document.getElementById('loading');
  ld.style.opacity='1'; ld.classList.remove('hide');
  const res=await Promise.allSettled(FEEDS.map(fetchFeed));
  all=res.flatMap(r=>r.status==='fulfilled'?r.value:[]).sort((a,b)=>(b.date||0)-(a.date||0));
  buildPages();
  setTimeout(()=>ld.classList.add('hide'),200);
}

loadAll();
</script>
</body>
</html>
